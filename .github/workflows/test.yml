name: Run Tests

on:
    push:
        branches:
            - "**"
    pull_request:
        branches:
            - "**"

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: "24"

            - name: Install dependencies
              run: yarn install

            - name: Run tests
              run: yarn test --coverage --verbose
